<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --nv:#1a3a5c;--gd:#e8b84b;--gdl:#fdf3d8;
  --gn:#27ae60;--gnl:#eafaf1;
  --rd:#e74c3c;--rdl:#fdecea;
  --og:#f39c12;--ogl:#fef3e2;
  --bl:#2980b9;--bll:#ebf5fb;
  --bg:#f0f4f8;--wh:#fff;--br:#dce3ea;
  --tx:#1a2533;--mt:#7f8c9a;
  --r:8px;--rl:12px;
}
body{
  font-family:-apple-system,'Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;
  min-height:100vh;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── SPLASH ── */
#splashScreen{
  background:var(--nv);
  align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
}
.splash-logo{
  width:96px;height:96px;border-radius:22px;
  background:var(--gd);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(232,184,75,.35);
}
.splash-logo img{width:72px;height:72px;object-fit:contain;}
.splash-title{color:#fff;font-size:26px;font-weight:800;letter-spacing:-.5px;}
.splash-sub{color:rgba(255,255,255,.5);font-size:13px;}
.splash-spin{
  width:28px;height:28px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--gd);
  border-radius:50%;
  animation:sp .7s linear infinite;
  margin-top:10px;
}

/* ── LOGIN ── */
#loginScreen{background:var(--nv);align-items:center;justify-content:center;}
.login-card{
  background:var(--wh);border-radius:20px;
  padding:28px 24px;width:calc(100% - 40px);max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.login-logo-wrap{text-align:center;margin-bottom:20px;}
.login-logo{
  width:72px;height:72px;border-radius:16px;
  background:var(--nv);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:10px;
}
.login-logo img{width:52px;height:52px;object-fit:contain;}
.login-title{font-size:18px;font-weight:800;color:var(--nv);margin-bottom:2px;}
.login-sub{font-size:12px;color:var(--mt);}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:24px 0 20px;}
.pin-dot{
  width:18px;height:18px;border-radius:50%;
  background:var(--br);border:2px solid var(--br);
  transition:all .2s;
}
.pin-dot.filled{background:var(--nv);border-color:var(--nv);}
.pin-dot.error{background:var(--rd);border-color:var(--rd);animation:shake .3s;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.num-btn{
  background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);
  padding:16px 8px;font-size:20px;font-weight:700;
  color:var(--nv);cursor:pointer;text-align:center;
  transition:background .1s,transform .1s;
  -webkit-appearance:none;
}
.num-btn:active{background:var(--nv);color:#fff;transform:scale(.95);}
.num-btn.del{font-size:16px;color:var(--mt);}
.num-btn.empty{background:transparent;border-color:transparent;cursor:default;}
.login-err{
  text-align:center;font-size:12px;color:var(--rd);
  font-weight:700;height:16px;margin-bottom:6px;
}

/* ── MAIN APP ── */
#appScreen{flex-direction:column;}
.hdr{
  background:var(--nv);color:#fff;
  padding:12px 14px;padding-top:max(12px, env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
  flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{
  width:34px;height:34px;border-radius:8px;
  background:var(--gd);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hdr-logo img{width:26px;height:26px;object-fit:contain;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:10px;opacity:.6;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.12);
  border-radius:20px;padding:4px 9px;
  font-size:10px;font-weight:700;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mt);}
.dot.on{background:var(--gn);}
.dot.err{background:var(--rd);}
.dot.busy{background:var(--gd);animation:blink .6s infinite;}
.hbtn{
  background:rgba(255,255,255,.15);border:none;border-radius:6px;color:#fff;
  width:30px;height:30px;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.hbtn:active{background:rgba(255,255,255,.3);}

/* date nav */
.date-nav{
  background:var(--wh);border-bottom:1px solid var(--br);
  padding:9px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  position:sticky;top:58px;z-index:90;flex-shrink:0;
}
.nav-btn{
  background:var(--bg);border:1px solid var(--br);border-radius:var(--r);
  color:var(--nv);width:32px;height:32px;font-size:18px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-btn:active{background:var(--nv);color:#fff;}
.date-center{text-align:center;flex:1;}
.date-label{font-size:14px;font-weight:700;color:var(--nv);}
.date-sub{font-size:10px;color:var(--mt);}
.today-btn{
  background:var(--gd);color:var(--nv);border:none;
  border-radius:var(--r);padding:6px 10px;
  font-size:10px;font-weight:800;cursor:pointer;flex-shrink:0;
}
.today-btn:active{opacity:.8;}

/* filter row */
.filter-row{
  background:var(--wh);border-bottom:1px solid var(--br);
  padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  display:none;flex-shrink:0;
}
.filter-row.show{display:flex;}
.filter-label{font-size:11px;color:var(--mt);white-space:nowrap;}
.date-input{
  border:1.5px solid var(--br);border-radius:var(--r);
  padding:6px 8px;font-size:12px;outline:none;
  font-family:inherit;color:var(--tx);background:var(--bg);
  -webkit-appearance:none;
}
.date-input:focus{border-color:var(--nv);}
.clear-btn{font-size:11px;color:var(--bl);background:none;border:none;cursor:pointer;font-weight:700;}

/* scroll */
.scroll{overflow-y:auto;flex:1;padding:12px 14px;
  padding-bottom:max(80px, calc(env(safe-area-inset-bottom) + 80px));}

/* cards */
.scard-wide{
  background:var(--nv);
  border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;
}
.scard-wide .lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.scard-wide .val{font-size:30px;font-weight:800;color:var(--gd);line-height:1;}
.scard-wide .val span{font-size:14px;font-weight:600;color:rgba(255,255,255,.4);margin-right:4px;}
.scard-wide .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:5px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.scard{background:var(--wh);border-radius:var(--rl);padding:11px 13px;border:1px solid var(--br);}
.scard .lbl{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.scard .val{font-size:20px;font-weight:800;color:var(--nv);line-height:1;}
.scard .val.green{color:var(--gn);}
.scard .val.gold{color:#b8770a;}
.scard .val.red{color:var(--rd);}
.scard .sub{font-size:10px;color:var(--mt);margin-top:3px;}

/* section title */
.stitle{font-size:10px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 8px;border-bottom:1px solid var(--br);margin-bottom:10px;display:flex;justify-content:space-between;}

/* chart */
.chart-wrap{background:var(--wh);border:1px solid var(--br);border-radius:var(--rl);padding:13px;margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:700;color:var(--nv);margin-bottom:10px;}
.chart-canvas-wrap{position:relative;width:100%;height:150px;}

/* operator rows */
.op-row{background:var(--wh);border:1px solid var(--br);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.op-name{font-size:13px;font-weight:700;color:var(--nv);}
.op-meta{font-size:11px;color:var(--mt);margin-top:2px;}
.op-total{font-size:14px;font-weight:800;color:var(--nv);text-align:right;}
.op-count{font-size:10px;color:var(--mt);text-align:right;margin-top:1px;}

/* country bars */
.country-bar{margin-bottom:9px;}
.country-label{font-size:11px;display:flex;justify-content:space-between;margin-bottom:3px;}
.country-name{font-weight:600;color:var(--tx);}
.country-val{color:var(--mt);}
.bar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;background:var(--nv);border-radius:3px;}

/* tx rows */
.tx-row{background:var(--wh);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;}
.tx-row.cancelled{opacity:.55;border-left:3px solid var(--rd);}
.tx-row.nonpaid{border-left:3px solid var(--bl);}
.tx-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px;}
.tx-name{font-size:13px;font-weight:700;color:var(--nv);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%;}
.tx-amt{font-size:14px;font-weight:800;color:var(--tx);}
.tx-mid{font-size:11px;color:var(--mt);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-bot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;display:inline-block;border:1px solid transparent;}
.b-paid{background:#d4edda;color:#155724;border-color:#a8d5b7;}
.b-post{background:#d4edda;color:#155724;border-color:#a8d5b7;}
.b-cancel{background:var(--rdl);color:var(--rd);border-color:#f5b7b1;}
.b-hold{background:#fff3cd;color:#856404;border-color:#ffd97a;}
.b-api{background:var(--bll);color:#004085;border-color:#b8daff;}
.b-other{background:var(--bg);color:var(--mt);border-color:var(--br);}
.b-free{background:var(--gnl);color:var(--gn);border-color:#a9dfbf;}
.tx-detail{font-size:10px;color:var(--mt);margin-top:4px;}

/* empty */
.empty{text-align:center;padding:40px 20px;color:var(--mt);}
.empty .ei{font-size:40px;margin-bottom:10px;}
.empty p{font-size:12px;line-height:1.7;}

/* loading */
.loading{text-align:center;padding:48px 20px;color:var(--mt);font-size:13px;}
.spin{display:inline-block;width:22px;height:22px;border:2.5px solid rgba(26,58,92,.15);border-top-color:var(--nv);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes sp{to{transform:rotate(360deg);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--nv);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;transition:transform .25s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--gn);}
.toast.err{background:var(--rd);}

/* settings overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.settings-sheet{background:var(--wh);border-radius:20px 20px 0 0;padding:20px 18px;padding-bottom:max(20px, env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-size:15px;font-weight:800;color:var(--nv);margin-bottom:16px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fg input{width:100%;border:1.5px solid var(--br);border-radius:var(--r);padding:10px 12px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none;transition:border .2s;}
.fg input:focus{border-color:var(--nv);}
.fg .hint{font-size:10px;color:var(--mt);margin-top:4px;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;width:100%;margin-bottom:8px;-webkit-appearance:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-nv{background:var(--nv);color:#fff;}
.btn-gn{background:var(--gn);color:#fff;}
.btn-rd{background:var(--rd);color:#fff;}
.btn-ghost{background:var(--bg);color:var(--tx);border:1px solid var(--br);}
.status-bar{border-radius:var(--r);padding:9px 12px;font-size:12px;font-weight:700;display:none;align-items:center;gap:8px;margin-top:8px;}
.status-bar.ok{background:var(--gnl);color:var(--gn);display:flex;}
.status-bar.err{background:var(--rdl);color:var(--rd);display:flex;}
.status-bar.busy{background:var(--bll);color:var(--bl);display:flex;}
.divider{height:1px;background:var(--br);margin:14px 0;}

/* bottom tab bar */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--wh);border-top:1px solid var(--br);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
  z-index:100;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;gap:3px;font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;border:none;background:none;transition:color .15s;}
.tab.active{color:var(--nv);}
.tab .ti{font-size:20px;}
.tab.active .ti{color:var(--nv);}
</style>
</head>

<!-- APP -->

  <header class="hdr">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STORE = {
  url: () => localStorage.getItem('ir_url') || '',
  key: () => localStorage.getItem('ir_key') || 'iremit2024newakbar',
  pin: () => localStorage.getItem('ir_pin') || '1234',
  setUrl: v => localStorage.setItem('ir_url', v),
  setKey: v => localStorage.setItem('ir_key', v),
  setPin: v => localStorage.setItem('ir_pin', v),
};

let allCustomers = [];
let currentDate = todayStr();
let currentTab = 'today';
let pinInput = '';
let isSettingUp = false;

function todayStr() {
  const n=new Date();
  const y=n.getFullYear();
  const m=String(n.getMonth()+1).padStart(2,'0');
  const d=String(n.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function addDays(dateStr, days) {
  const parts=dateStr.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fmtRM(v) { return parseFloat(v||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isCancelled(tx) { const s=(tx.status||'PAID').toUpperCase(); return s!=='PAID'&&s!=='POST'; }
function getTxTotal(tx) { return parseFloat(tx.totalCollected)||((parseFloat(tx.amountRM)||0)+(parseFloat(tx.serviceFee)||0)); }

function txSortKey(tx) {
  if(!tx) return 0;
  const date=tx.date||(tx.capturedAt||'').split('T')[0]||'';
  if(!date) return new Date(tx.capturedAt||0).getTime()||0;
  if(tx.time){
    const m=tx.time.match(/(\d{1,2}):(\d{2}):(\d{2})\s*([AP]M)/i);
    if(m){
      let hh=parseInt(m[1]),mm=parseInt(m[2]),ss=parseInt(m[3]);
      if(m[4].toUpperCase()==='PM'&&hh!==12) hh+=12;
      if(m[4].toUpperCase()==='AM'&&hh===12) hh=0;
      const dt=new Date(date+'T00:00:00');
      if(!isNaN(dt.getTime())){dt.setHours(hh,mm,ss,0);return dt.getTime();}
    }
  }
  return new Date(date+'T00:00:00').getTime()||0;
}

function getAllTx() {
  const out=[];
  allCustomers.forEach(c=>{
    const txs=c.transactions;if(!txs)return;
    const arr=Array.isArray(txs)?txs:Object.values(txs);
    arr.forEach(tx=>out.push({c,tx}));
  });
  return out;
}

function statusBadge(tx) {
  const s=(tx.status||'PAID').toUpperCase().replace(/\s+/g,'-');
  const map={
    'PAID':['b-paid','✅ PAID'],'POST':['b-post','📤 POST'],
    'CANCELLED':['b-cancel','❌ CANCELLED'],'HOLD':['b-hold','⏸ HOLD'],
    'COMPLIANCE':['b-hold','⛔ COMPLIANCE'],'UNPAID':['b-hold','⛔ UNPAID'],
    'API-PROCESSING':['b-api','⚙ PROCESSING'],'PROCESSING':['b-api','⏳ PROCESSING'],
    'PENDING':['b-api','⏳ PENDING']
  };
  const [cls,lbl]=map[s]||['b-other',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function toast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'')+' show';
  setTimeout(()=>t.className='toast',3000);
}

function setSyncStatus(s) {
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  dot.className='dot';
  if(s==='on'){dot.classList.add('on');lbl.textContent='Synced';}
  else if(s==='busy'){dot.classList.add('busy');lbl.textContent='Loading…';}
  else{dot.classList.add('err');lbl.textContent='Offline';}
}

async function callAPI(action,extra){
  const url=STORE.url(),key=STORE.key();
  if(!url) throw new Error('No URL configured');
  const payload=Object.assign({action,key},extra||{});
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),redirect:'follow'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data=await res.json();
  if(!data.ok) throw new Error(data.error||'API error');
  return data;
}

async function loadData(silent){
  if(!silent){
    document.getElementById('loadingMsg').style.display='block';
    document.getElementById('dashContent').style.display='none';
  }
  setSyncStatus('busy');
  try{
    const r=await callAPI('getAll');
    if(r&&r.customers){allCustomers=r.customers;setSyncStatus('on');}
  }catch(e){
    setSyncStatus('err');
    if(!silent) toast('⚠ '+e.message,'err');
  }
  renderView();
}

/* ── RENDER ── */
function renderView() {
  if(currentTab==='today') renderDashboard();
  else if(currentTab==='range') renderRange();
  else renderAllTx();
}

function renderDashboard() {
  const all=getAllTx().filter(({tx})=>{
    const d=tx.date||(tx.capturedAt||'').split('T')[0]||'';
    return d===currentDate;
  }).sort((a,b)=>txSortKey(b.tx)-txSortKey(a.tx));

  const paid=all.filter(({tx})=>!isCancelled(tx));
  const cancelled=all.filter(({tx})=>isCancelled(tx));
  const totalColl=paid.reduce((s,{tx})=>s+getTxTotal(tx),0);
  const totalRemit=paid.reduce((s,{tx})=>s+(parseFloat(tx.amountRM)||0),0);
  const totalFee=paid.reduce((s,{tx})=>s+(parseFloat(tx.serviceFee)||0),0);
  const cancelAmt=cancelled.reduce((s,{tx})=>s+getTxTotal(tx),0);

  const byOp={};
  paid.forEach(({tx})=>{
    const op=tx.tellerId||'(no operator)';
    if(!byOp[op])byOp[op]={count:0,total:0};
    byOp[op].count++;byOp[op].total+=getTxTotal(tx);
  });

  const byCountry={};
  paid.forEach(({tx})=>{
    const co=tx.country||'Unknown';
    if(!byCountry[co])byCountry[co]=0;
    byCountry[co]+=(parseFloat(tx.amountRM)||0);
  });

  const days7=[];
  for(let i=6;i>=0;i--){
    days7.push(addDays(currentDate,-i));
  }
  const chartVals=days7.map(d=>getAllTx().filter(({tx})=>{
    const td=tx.date||(tx.capturedAt||'').split('T')[0]||'';
    return td===d&&!isCancelled(tx);
  }).reduce((s,{tx})=>s+getTxTotal(tx),0));
  const chartLabels=days7.map(d=>{
    const p=d.split('-');
    return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).toLocaleDateString('en-MY',{weekday:'short',day:'numeric'});
  });

  const opEntries=Object.entries(byOp).sort((a,b)=>b[1].total-a[1].total);
  const countryEntries=Object.entries(byCountry).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCo=countryEntries.length?countryEntries[0][1]:1;

  let html=`
  <div class="scard-wide">
    <div class="lbl">Total Collected Today</div>
    <div class="val"><span>RM</span>${fmtRM(totalColl)}</div>
    <div class="sub">${paid.length} confirmed · RM${fmtRM(totalRemit)} remit + RM${fmtRM(totalFee)} fees</div>
  </div>
  <div class="sgrid">
    <div class="scard"><div class="lbl">Transactions</div><div class="val">${paid.length}</div><div class="sub">${cancelled.length} cancelled</div></div>
    <div class="scard"><div class="lbl">Fees</div><div class="val green">RM${fmtRM(totalFee)}</div><div class="sub">avg RM${fmtRM(paid.length?totalFee/paid.length:0)}</div></div>
    <div class="scard"><div class="lbl">Avg TX</div><div class="val gold">RM${fmtRM(paid.length?totalColl/paid.length:0)}</div><div class="sub">per transaction</div></div>
    <div class="scard"><div class="lbl">Cancelled</div><div class="val ${cancelled.length?'red':''}">${cancelled.length}</div><div class="sub">RM${fmtRM(cancelAmt)}</div></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">📈 7-Day Collection (RM)</div>
    <div class="chart-canvas-wrap"><canvas id="chartC" role="img" aria-label="7-day collection bar chart">Daily collection for the past 7 days.</canvas></div>
  </div>`;

  if(opEntries.length){
    html+=`<div class="stitle">👤 By Operator</div>`;
    opEntries.forEach(([op,s])=>{
      html+=`<div class="op-row"><div><div class="op-name">${esc(op)}</div><div class="op-meta">${s.count} tx · avg RM${fmtRM(s.total/s.count)}</div></div><div><div class="op-total">RM ${fmtRM(s.total)}</div><div class="op-count">collected</div></div></div>`;
    });
  }

  if(countryEntries.length){
    html+=`<div class="stitle" style="margin-top:12px;">🌍 By Destination</div><div class="scard">`;
    countryEntries.forEach(([co,amt])=>{
      const pct=Math.round((amt/(totalRemit||1))*100);
      html+=`<div class="country-bar"><div class="country-label"><span class="country-name">${esc(co)}</span><span class="country-val">RM${fmtRM(amt)} · ${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="stitle" style="margin-top:12px;">📋 Transactions (${all.length})</div>`;
  if(!all.length){
    html+=`<div class="empty"><div class="ei">📭</div><p>No transactions today.</p></div>`;
  } else {
    all.forEach(({c,tx})=>{ html+=txCard(c,tx); });
  }

  const content=document.getElementById('dashContent');
  content.innerHTML=html;
  document.getElementById('loadingMsg').style.display='none';
  content.style.display='block';

  setTimeout(()=>{
    const ctx=document.getElementById('chartC');
    if(!ctx||!window.Chart)return;
    if(window._irChart){try{window._irChart.destroy();}catch(e){}}
    window._irChart=new Chart(ctx,{
      type:'bar',
      data:{labels:chartLabels,datasets:[{label:'RM',data:chartVals.map(v=>Math.round(v*100)/100),backgroundColor:chartVals.map((_,i)=>i===6?'#e8b84b':'#1a3a5c'),borderRadius:4,borderSkipped:'bottom'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#7f8c9a'}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10},color:'#7f8c9a',callback:v=>'RM'+v.toLocaleString('en-MY')}}}}
    });
  },100);
}

function renderRange() {
  const from=document.getElementById('filterFrom').value;
  const to=document.getElementById('filterTo').value;
  if(!from&&!to){
    const content=document.getElementById('dashContent');
    content.innerHTML=`<div class="empty"><div class="ei">📅</div><p>Select a date range above to view sales summary.</p></div>`;
    document.getElementById('loadingMsg').style.display='none';
    content.style.display='block';
    return;
  }
  let all=getAllTx().filter(({tx})=>{
    const d=tx.date||(tx.capturedAt||'').split('T')[0]||'';
    if(from&&d<from)return false;
    if(to&&d>to)return false;
    return true;
  }).sort((a,b)=>txSortKey(b.tx)-txSortKey(a.tx));

  const paid=all.filter(({tx})=>!isCancelled(tx));
  const totalColl=paid.reduce((s,{tx})=>s+getTxTotal(tx),0);
  const totalRemit=paid.reduce((s,{tx})=>s+(parseFloat(tx.amountRM)||0),0);
  const totalFee=paid.reduce((s,{tx})=>s+(parseFloat(tx.serviceFee)||0),0);
  const cancelled=all.filter(({tx})=>isCancelled(tx));

  const byOp={};
  paid.forEach(({tx})=>{
    const op=tx.tellerId||'(no operator)';
    if(!byOp[op])byOp[op]={count:0,total:0};
    byOp[op].count++;byOp[op].total+=getTxTotal(tx);
  });

  let html=`
  <div class="scard-wide">
    <div class="lbl">Total Collected ${from||'…'} → ${to||'…'}</div>
    <div class="val"><span>RM</span>${fmtRM(totalColl)}</div>
    <div class="sub">${paid.length} confirmed · RM${fmtRM(totalRemit)} remit + RM${fmtRM(totalFee)} fees</div>
  </div>
  <div class="sgrid">
    <div class="scard"><div class="lbl">Transactions</div><div class="val">${paid.length}</div><div class="sub">${cancelled.length} cancelled</div></div>
    <div class="scard"><div class="lbl">Fees</div><div class="val green">RM${fmtRM(totalFee)}</div><div class="sub">avg RM${fmtRM(paid.length?totalFee/paid.length:0)}</div></div>
    <div class="scard"><div class="lbl">Avg TX</div><div class="val gold">RM${fmtRM(paid.length?totalColl/paid.length:0)}</div><div class="sub">per transaction</div></div>
    <div class="scard"><div class="lbl">Days</div><div class="val">${from&&to?Math.round((new Date(to)-new Date(from))/86400000)+1:'—'}</div><div class="sub">in range</div></div>
  </div>`;

  if(Object.keys(byOp).length){
    html+=`<div class="stitle">👤 Operator Breakdown</div>`;
    Object.entries(byOp).sort((a,b)=>b[1].total-a[1].total).forEach(([op,s])=>{
      html+=`<div class="op-row"><div><div class="op-name">${esc(op)}</div><div class="op-meta">${s.count} tx</div></div><div><div class="op-total">RM ${fmtRM(s.total)}</div><div class="op-count">collected</div></div></div>`;
    });
  }

  html+=`<div class="stitle" style="margin-top:12px;">📋 Transactions (${all.length})</div>`;
  if(!all.length){
    html+=`<div class="empty"><div class="ei">📭</div><p>No transactions in this range.</p></div>`;
  } else {
    all.forEach(({c,tx})=>{ html+=txCard(c,tx); });
  }

  const content=document.getElementById('dashContent');
  content.innerHTML=html;
  document.getElementById('loadingMsg').style.display='none';
  content.style.display='block';
}

function renderAllTx() {
  const all=getAllTx().sort((a,b)=>txSortKey(b.tx)-txSortKey(a.tx)).slice(0,80);
  let html=`<div class="stitle">📋 Recent Transactions (${all.length})</div>`;
  if(!all.length){
    html+=`<div class="empty"><div class="ei">📭</div><p>No transactions found.</p></div>`;
  } else {
    all.forEach(({c,tx})=>{ html+=txCard(c,tx); });
  }
  const content=document.getElementById('dashContent');
  content.innerHTML=html;
  document.getElementById('loadingMsg').style.display='none';
  content.style.display='block';
}

function txCard(c,tx) {
  const isCan=isCancelled(tx);
  const st=(tx.status||'PAID').toUpperCase().replace(/\s+/g,'-');
  const isNonPaid=!isCan&&st!=='PAID';
  const isFree=tx.isFree===true||tx.isFree==='TRUE';
  const total=getTxTotal(tx);
  let cls='tx-row';
  if(isCan)cls+=' cancelled';
  else if(isNonPaid)cls+=' nonpaid';
  return `<div class="${cls}">
    <div class="tx-top">
      <div class="tx-name">${esc(c.name)}</div>
      <div class="tx-amt">RM ${fmtRM(total)}</div>
    </div>
    <div class="tx-mid">→ ${esc(tx.receiver||'—')}${tx.country?' · '+esc(tx.country):''}</div>
    <div class="tx-bot">
      ${statusBadge(tx)}
      ${isFree&&!isCan?'<span class="badge b-free">🎁 FREE</span>':''}
      ${tx.tellerId?`<span class="badge b-other">👤${esc(tx.tellerId)}</span>`:''}
    </div>
    ${tx.amountRM||tx.serviceFee?`<div class="tx-detail">RM${fmtRM(tx.amountRM)} remit + RM${fmtRM(tx.serviceFee||0)} fee${tx.date?' · '+tx.date:''}${tx.time?' '+tx.time:''}</div>`:''}
  </div>`;
}

/* ── TABS ── */
function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');

  const filterRow=document.getElementById('filterRow');
  const dateNav=document.querySelector('.date-nav');
  if(tab==='range'){
    filterRow.classList.add('show');
    dateNav.style.display='none';
  } else {
    filterRow.classList.remove('show');
    dateNav.style.display='flex';
  }

  document.getElementById('dashContent').style.display='none';
  document.getElementById('loadingMsg').style.display='none';
  renderView();
}

/* ── DATE NAV ── */
function updateDateHeader() {
  const parts=currentDate.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const t=todayStr();
  const yStr=addDays(t,-1);
  if(currentDate===t) document.getElementById('dateLabel').textContent='Today';
  else if(currentDate===yStr) document.getElementById('dateLabel').textContent='Yesterday';
  else document.getElementById('dateLabel').textContent=d.toLocaleDateString('en-MY',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('dateSub').textContent=d.toLocaleDateString('en-MY',{day:'2-digit',month:'long',year:'numeric'});
}

document.getElementById('btnPrev').addEventListener('click',()=>{
  currentDate=addDays(currentDate,-1);
  updateDateHeader();renderView();
});
document.getElementById('btnNext').addEventListener('click',()=>{
  currentDate=addDays(currentDate,1);
  updateDateHeader();renderView();
});
document.getElementById('btnToday').onclick=()=>{
  currentDate=todayStr();updateDateHeader();renderView();
};

document.getElementById('filterFrom').onchange=()=>renderView();
document.getElementById('filterTo').onchange=()=>renderView();
document.getElementById('btnClearFilter').onclick=()=>{
  document.getElementById('filterFrom').value='';
  document.getElementById('filterTo').value='';
  renderView();
};

document.getElementById('btnRefresh').onclick=()=>loadData();

function openSettings() {
  document.getElementById('settingsUrl').value=STORE.url();
  document.getElementById('settingsKey').value=STORE.key();
  document.getElementById('newPin').value='';
  document.getElementById('connStatus').className='status-bar';
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}
document.getElementById('btnSettings').onclick=openSettings;

document.getElementById('btnTestConn').onclick=async()=>{
  const url=document.getElementById('settingsUrl').value.trim();
  const key=document.getElementById('settingsKey').value.trim()||'iremit2024newakbar';
  const st=document.getElementById('connStatus');
  if(!url){st.className='status-bar err';st.textContent='⚠ Enter the Web App URL first.';return;}
  st.className='status-bar busy';st.textContent='⏳ Testing…';
  try{
    const origUrl=STORE.url(),origKey=STORE.key();
    localStorage.setItem('ir_url',url);localStorage.setItem('ir_key',key);
    const r=await callAPI('ping');
    localStorage.setItem('ir_url',origUrl);localStorage.setItem('ir_key',origKey);
    st.className='status-bar ok';st.textContent='✅ Connected! '+r.message;
  }catch(e){
    st.className='status-bar err';st.textContent='❌ '+e.message;
  }
};

document.getElementById('btnSaveSettings').onclick=()=>{
  const url=document.getElementById('settingsUrl').value.trim();
  const key=document.getElementById('settingsKey').value.trim()||'iremit2024newakbar';
  if(!url){
    const st=document.getElementById('connStatus');
    st.className='status-bar err';st.textContent='⚠ URL is required.';return;
  }
  STORE.setUrl(url);STORE.setKey(key);
  closeSettings();
  toast('✅ Settings saved!','ok');
  loadData();
};

document.getElementById('btnChangePin').onclick=()=>{
  const np=document.getElementById('newPin').value.trim();
  if(!/^\d{4}$/.test(np)){toast('PIN must be exactly 4 digits','err');return;}
  STORE.setPin(np);
  toast('✅ PIN changed!','ok');
  document.getElementById('newPin').value='';
};

document.getElementById('btnLockApp').onclick=()=>{
  closeSettings();
  showScreen('loginScreen');
  pinInput='';updatePinDots();
};

/* ── LOGIN ── */
function updatePinDots(err) {
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.className='pin-dot'+(pinInput.length>i?' filled':'')+(err?' error':'');
  }
}

document.getElementById('numpad').addEventListener('click',e=>{
  const btn=e.target.closest('.num-btn');
  if(!btn||btn.classList.contains('empty')) return;
  if(btn.id==='btnDel'){
    pinInput=pinInput.slice(0,-1);
    updatePinDots();
    document.getElementById('loginErr').textContent='';
    return;
  }
  const n=btn.dataset.n;
  if(pinInput.length>=4) return;
  pinInput+=n;
  updatePinDots();
  if(pinInput.length===4){
    setTimeout(checkPin,120);
  }
});

function checkPin() {
  const correct=STORE.pin();
  if(pinInput===correct){
    document.getElementById('loginErr').textContent='';
    showScreen('appScreen');
    updateDateHeader();
    loadData();
  } else {
    updatePinDots(true);
    document.getElementById('loginErr').textContent='Incorrect PIN. Try again.';
    setTimeout(()=>{
      pinInput='';
      updatePinDots();
      document.getElementById('loginErr').textContent='';
    },1000);
  }
}

/* ── SCREEN MANAGER ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── BOOT ── */
function boot() {
  // Show splash for 1.5s
  setTimeout(()=>{
    if(!STORE.url()){
      // No URL: show login (first time will go to settings after login)
      document.getElementById('loginHint').textContent='Default PIN: 1234';
    }
    showScreen('loginScreen');
    pinInput='';updatePinDots();
  }, 1500);
}

// Auto-refresh every 30s when app is visible
setInterval(()=>{
  if(document.getElementById('appScreen').classList.contains('active')&&STORE.url()){
    loadData(true);
  }
},30000);

// Refresh when tab becomes visible again (phone switches back to app)
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&document.getElementById('appScreen').classList.contains('active')&&STORE.url()){
    loadData(true);
  }
});

boot();
</script>
</body>
</html>
